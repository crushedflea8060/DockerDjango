{% extends 'base.html' %}

{% if request.user.is_authenticated %}
   <p>Hi, {{ request.user.username }}!</p>
{% endif %}
{% block content %}
   {% for post in object_list %}
      <div class="post-entry">
         <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
         <p> {{ post.body }}</p>
      </div>
   {% endfor %}
{% endblock content %}
